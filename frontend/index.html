<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📻 AI Podcasts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="min-h-screen p-6 flex flex-col items-center">
    <h1 class="text-4xl font-bold mb-8 text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">AI Podcasts</h1>
    
    <div class="w-full max-w-4xl grid grid-cols-1 md:grid-cols-2 gap-8">
        <!-- Colonne Création -->
        <div class="glass p-6 rounded-2xl shadow-xl flex flex-col gap-4">
            <h2 class="text-2xl font-semibold mb-2">🎙️ Créer un épisode</h2>
            
            <div>
                <label class="block text-sm text-gray-400 mb-1">Titre de l'épisode</label>
                <input type="text" id="title" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-white focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Ex: La vie sur Mars">
            </div>

            <div>
                <label class="block text-sm text-gray-400 mb-1">Script complet</label>
                <textarea id="script" rows="4" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-white focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Il était une fois..."></textarea>
            </div>

            <div>
                <label class="block text-sm text-gray-400 mb-1">Preset de voix</label>
                <select id="voice" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-white focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="kurzgesagt">Kurzgesagt (Documentaire)</option>
                    <option value="leo_tobey">Leo / Tobey (Conversationnel)</option>
                    <option value="custom">Custom (Modèle personnalisé)</option>
                </select>
            </div>

            <div id="customVoiceModel" class="hidden">
                <label class="block text-sm text-gray-400 mb-1">ID du modèle Replicate Custom</label>
                <input type="text" id="customModelId" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-white focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Ex: r8_...">
            </div>

            <div>
                <label class="block text-sm text-gray-400 mb-1">Clé API Replicate (Optionnel, laisse vide pour utiliser celle de l'agent)</label>
                <input type="password" id="apiKey" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-white focus:ring-2 focus:ring-blue-500 outline-none" placeholder="r8_...">
            </div>

            <button onclick="generatePodcast()" id="generateBtn" class="mt-4 w-full bg-gradient-to-r from-blue-500 to-cyan-500 hover:from-blue-600 hover:to-cyan-600 text-white font-bold py-3 px-4 rounded-lg transition-all transform hover:scale-[1.02] active:scale-95">
                Générer l'audio 🚀
            </button>
            <p id="statusMsg" class="text-sm text-center text-gray-400 hidden">Génération en cours... (ça peut prendre 1-2 min)</p>
        </div>

        <!-- Colonne Feed -->
        <div class="glass p-6 rounded-2xl shadow-xl flex flex-col gap-4">
            <h2 class="text-2xl font-semibold mb-2">🎧 Fil d'actualité</h2>
            <div id="feed" class="flex flex-col gap-4 overflow-y-auto max-h-[600px] pr-2">
                <!-- Les podcasts s'affichent ici -->
            </div>
        </div>
    </div>

    <script>
        document.getElementById('voice').addEventListener('change', function(e) {
            if(e.target.value === 'custom') {
                document.getElementById('customVoiceModel').classList.remove('hidden');
            } else {
                document.getElementById('customVoiceModel').classList.add('hidden');
            }
        });

        async function fetchPodcasts() {
            try {
                const res = await fetch('/api/podcasts');
                const data = await res.json();
                const feed = document.getElementById('feed');
                feed.innerHTML = '';
                
                // Reverse to show newest first
                data.slice().reverse().forEach(p => {
                    feed.innerHTML += `
                        <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700 hover:border-slate-500 transition-colors">
                            <h3 class="text-lg font-bold text-cyan-300">${p.title}</h3>
                            <p class="text-sm text-gray-400 mb-2">Par <b>${p.author}</b> • ${p.duration}</p>
                            <p class="text-sm text-gray-300 mb-4 line-clamp-2">${p.description}</p>
                            <audio controls class="w-full mb-3 h-10 rounded-full" style="filter: invert(100%) hue-rotate(180deg);">
                                <source src="${p.audioUrl}" type="audio/mpeg">
                                Votre navigateur ne supporte pas l'audio.
                            </audio>
                            <button onclick="like(${p.id})" class="text-pink-500 hover:text-pink-400 flex items-center gap-1 transition-colors">
                                ❤️ <span>${p.likes}</span>
                            </button>
                        </div>
                    `;
                });
            } catch (err) {
                console.error("Erreur chargement podcasts", err);
            }
        }

        async function like(id) {
            await fetch(`/api/podcasts/${id}/like`, { method: 'POST' });
            fetchPodcasts();
        }

        async function generatePodcast() {
            const btn = document.getElementById('generateBtn');
            const status = document.getElementById('statusMsg');
            const title = document.getElementById('title').value;
            const script = document.getElementById('script').value;
            const voice = document.getElementById('voice').value;
            const apiKey = document.getElementById('apiKey').value;
            
            if(!title || !script) return alert('Titre et script requis !');

            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');
            status.classList.remove('hidden');

            // TODO: Relier à un vrai endpoint de génération backend. 
            // Pour l'instant on simule l'attente et on ajoute un mock pour montrer que ça marche côté UI
            setTimeout(async () => {
                const mockUrl = "https://replicate.delivery/xezq/OkHeXSPd342kWC2kc3i7yrgOrsNMzD9Mex3R5vPHefOR3AfxC/tmpn9kfrnbt.mp3";
                
                await fetch('/api/podcasts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: title,
                        author: apiKey ? "User Custom" : "Séraphin (Auto)",
                        duration: "0:45",
                        audioUrl: mockUrl,
                        description: script.substring(0, 100) + '...'
                    })
                });

                document.getElementById('title').value = '';
                document.getElementById('script').value = '';
                
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                status.classList.add('hidden');
                
                fetchPodcasts();
            }, 3000);
        }

        fetchPodcasts();
    </script>
</body>
</html>
