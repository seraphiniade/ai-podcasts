<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Podcasts</title>
    <style>
         
@keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse-btn {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(76, 175, 80, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(76, 175, 80, 0); }
        }
        .upload-btn {
            background: #4caf50; 
            color: white; 
            padding: 10px 20px; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .upload-btn:hover {
            animation: pulse-btn 1.5s infinite;
            background: #45a049;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top, #2c2c2c, #0a0a0a);
            background-attachment: fixed;
            color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 60px;
            margin: 0;
            min-height: 100vh;
        }
        h1 { 
            color: transparent; 
            background: linear-gradient(90deg, #ff9800, #ff5722);
            -webkit-background-clip: text;
            background-clip: text;
            margin-bottom: 5px; 
            font-size: 3rem;
            text-shadow: 0 4px 10px rgba(255,152,0,0.3);
        }
        .subtitle { color: #888; margin-bottom: 30px; }
        #status {
            padding: 10px;
            background: #1e1e1e;
            border-radius: 5px;
            font-family: monospace;
            color: #4caf50;
            margin-bottom: 30px;
        }
        .episode {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(40px) saturate(250%);
            -webkit-backdrop-filter: blur(40px) saturate(250%);
            padding: 25px;
            border-radius: 20px;
            width: 80%;
            max-width: 600px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.05);
            text-align: left;
            margin-bottom: 30px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease, border-color 0.4s ease;
            border: 1px solid rgba(255, 255, 255, 0.08);
            animation: fadeIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
            position: relative;
            overflow: hidden;
        }
        .episode::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 100%);
            pointer-events: none;
        }
        .episode:hover {
            transform: translateY(-8px);
            box-shadow: 0 16px 40px rgba(255, 152, 0, 0.2);
            border-color: rgba(255, 152, 0, 0.5);
        }
        .episode h3 { margin-top: 0; color: #ff9800; font-size: 1.4rem; }
        .episode p { color: #ccc; font-size: 14px; line-height: 1.5; }
        audio { 
            width: 100%; 
            margin-top: 20px;
            border-radius: 50px;
            background-color: rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            outline: none;
            transition: box-shadow 0.3s ease, transform 0.3s ease;
        }
        audio:hover, audio:focus {
            box-shadow: 0 8px 25px rgba(255, 152, 0, 0.6);
            transform: scale(1.02);
        }
        audio::-webkit-media-controls-panel {
            background-color: transparent;
        }
        audio::-webkit-media-controls-play-button {
            background-color: #ff9800;
            border-radius: 50%;
        }
        audio::-webkit-media-controls-current-time-display,
        audio::-webkit-media-controls-time-remaining-display {
            color: #333;
            font-weight: bold;
        }
        .actions {
            margin-top: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .like-btn {
            background: #333;
            border: none;
            color: #fff;
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: background 0.2s;
        }
        .like-btn:hover { background: #444; }
        .like-btn.liked { color: #e91e63; }
    </style>
</head>
<body>
    <nav style="margin-bottom: 20px;"><a href="/" style="color: #ff9800; text-decoration: none; margin-right: 15px;">Accueil</a><a href="/about.html" style="color: #ff9800; text-decoration: none;">À Propos</a></nav>
    <h1>Bienvenue sur AI-Podcasts</h1>
    <div class="subtitle">La plateforme audio par l'IA.</div>

    
    
    <div class="episode" id="ai-generate-container" style="background: rgba(30,30,40,0.4); border: 1px solid rgba(255,255,255,0.1); text-align: center; margin-top: 20px;">
        <h3 style="color: #00bcd4; font-weight: 300;">✨ Générer un Podcast par l'IA</h3>
        <form id="generate-form" style="display: flex; flex-direction: column; gap: 10px; align-items: center;">
            <input type="text" name="title" placeholder="Titre du podcast" required style="padding: 10px; width: 80%; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.5); color: white;">
            <input type="text" name="author" placeholder="Votre nom" style="padding: 10px; width: 80%; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.5); color: white;">
            <textarea name="text" placeholder="Le script du podcast (ex: Bienvenue sur ce nouvel épisode...)" required style="padding: 10px; width: 80%; height: 80px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.5); color: white; resize: vertical;"></textarea>
            <button type="submit" class="upload-btn" style="background: linear-gradient(135deg, #00bcd4, #2196f3); box-shadow: 0 4px 15px rgba(0,188,212,0.4);">Générer l'audio 🎧</button>
        </form>
        <p id="generate-status" style="margin-top: 10px; font-size: 14px; color: #aaa;"></p>
    </div>

    <div class="episode" id="upload-form-container" style="background: #222; border: 1px dashed #555; text-align: center;">
        <h3 style="color: #4caf50;">Ajouter un nouvel épisode (Audio)</h3>
        <form id="upload-form" enctype="multipart/form-data" style="display: flex; flex-direction: column; gap: 10px; align-items: center;">
            <input type="text" name="title" placeholder="Titre de l'épisode" required style="padding: 8px; width: 80%; border-radius: 5px; border: none;">
            <input type="text" name="author" placeholder="Auteur (ex: IA Model)" style="padding: 8px; width: 80%; border-radius: 5px; border: none;">
            <textarea name="description" placeholder="Description de l'épisode" style="padding: 8px; width: 80%; border-radius: 5px; border: none; resize: vertical;"></textarea>
            <input type="file" name="audioFile" accept="audio/*" required style="color: white;">
            <button type="submit" class="upload-btn">Uploader l'épisode</button>
        </form>
        <p id="upload-status" style="margin-top: 10px; font-size: 14px;"></p>
    </div>
    
    <script>
        
        document.getElementById('generate-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const status = document.getElementById('generate-status');
            status.innerText = 'Génération en cours avec l\'IA (cela peut prendre une minute)...';
            status.style.color = '#00bcd4';
            
            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());
            
            fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(resData => {
                if(resData.success) {
                    status.innerText = 'Épisode généré avec succès ! Redémarrage...';
                    status.style.color = '#4caf50';
                    setTimeout(() => location.reload(), 1500);
                } else {
                    status.innerText = 'Erreur : ' + (resData.error || 'Inconnue');
                    status.style.color = '#f44336';
                }
            })
            .catch(err => {
                status.innerText = 'Erreur réseau.';
                status.style.color = '#f44336';
            });
        });

        document.getElementById('upload-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const status = document.getElementById('upload-status');
            status.innerText = 'Upload en cours...';
            status.style.color = '#ff9800';
            
            const formData = new FormData(this);
            fetch('/api/episodes', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    status.innerText = 'Épisode ajouté avec succès ! Redémarrage...';
                    status.style.color = '#4caf50';
                    setTimeout(() => location.reload(), 1500);
                } else {
                    status.innerText = 'Erreur : ' + (data.error || 'Inconnue');
                    status.style.color = '#f44336';
                }
            })
            .catch(err => {
                status.innerText = 'Erreur réseau.';
                status.style.color = '#f44336';
            });
        });
    </script>

    
    <div style="margin-bottom: 20px; width: 80%; max-width: 600px; display: flex; justify-content: flex-end;">
        <label for="sort-select" style="margin-right: 10px; color: #ff9800; font-weight: bold; align-self: center;">Trier par :</label>
        <select id="sort-select" style="padding: 8px; border-radius: 5px; background: #333; color: white; border: 1px solid #555; outline: none; cursor: pointer;">
            <option value="newest">Plus récents</option>
            <option value="popular">Popularité (Likes)</option>
        </select>
    </div>

    <div id="episodes-container" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>

    <script>
        let allEpisodes = [];

        function likeEpisode(id, btn) {
            fetch(`/api/episodes/${id}/like`, { method: 'POST' })
                .then(res => res.json())
                .then(data => {
                    if(data.success) {
                        btn.innerHTML = `❤️ ${data.likes}`;
                        btn.classList.add('liked');
                        // Update in array
                        const ep = allEpisodes.find(e => e.id === id);
                        if(ep) ep.likes = data.likes;
                    }
                });
        }

        function renderEpisodes(episodes) {
            const container = document.getElementById('episodes-container');
            container.innerHTML = '';
            episodes.forEach((ep, index) => {
                const card = document.createElement('div');
                card.className = 'episode';
                card.style.animationDelay = `${index * 0.15}s`;
                card.innerHTML = `
                    <h3>${ep.title}</h3>
                    <p><strong>Auteur :</strong> ${ep.author || 'Inconnu'}</p>
                    <p>${ep.description || ''}</p>
                    <audio controls preload="none">
                        <source src="${ep.audio}" type="audio/mpeg">
                        Votre navigateur ne supporte pas la balise audio.
                    </audio>
                    <div class="actions">
                        <button class="like-btn" onclick="likeEpisode(${ep.id}, this)">🤍 ${ep.likes || 0}</button>
                        <span style="font-size: 14px; color: #888;">💬 ${ep.comments ? ep.comments.length : 0} commentaires</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        document.getElementById('sort-select').addEventListener('change', (e) => {
            const sortBy = e.target.value;
            let sorted = [...allEpisodes];
            if (sortBy === 'popular') {
                sorted.sort((a, b) => (b.likes || 0) - (a.likes || 0));
            } else {
                sorted.sort((a, b) => b.id - a.id);
            }
            renderEpisodes(sorted);
        });

        fetch('/api/episodes')
            .then(res => res.json())
            .then(episodes => {
                allEpisodes = episodes;
                const sorted = [...allEpisodes].sort((a, b) => b.id - a.id);
                renderEpisodes(sorted);
            })
            .catch(err => console.error('Erreur chargement episodes', err));
    </script>



    
    <!-- Three.js 3D Visualizer -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <div id="threejs-container"></div>
    <style>
        #threejs-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
            opacity: 0.6;
        }
    </style>
    <script>
        let audioContext = null;
        let analyser = null;
        let dataArray = null;
        let sourceNodes = new Map();

        // Three.js setup
        const container = document.getElementById('threejs-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        // Create a sphere made of particles
        const geometry = new THREE.IcosahedronGeometry(10, 3); // 3 detail level creates many vertices
        const material = new THREE.PointsMaterial({
            color: 0xff9800,
            size: 0.2,
            blending: THREE.AdditiveBlending,
            transparent: true,
            opacity: 0.8
        });
        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        // Store original vertices for animation
        const positions = geometry.attributes.position;
        const initialPositions = new Float32Array(positions.count * 3);
        for(let i = 0; i < positions.count * 3; i++) {
            initialPositions[i] = positions.array[i];
        }

        camera.position.z = 30;

        function animate() {
            requestAnimationFrame(animate);

            if (analyser && dataArray) {
                analyser.getByteFrequencyData(dataArray);
                
                // Get average frequency for overall scale
                let sum = 0;
                for(let i = 0; i < dataArray.length; i++) {
                    sum += dataArray[i];
                }
                const avg = sum / dataArray.length;
                
                // Rotate
                particles.rotation.x += 0.002;
                particles.rotation.y += 0.002;

                // Deform particles based on audio
                const positions = particles.geometry.attributes.position;
                for (let i = 0; i < positions.count; i++) {
                    const ix = i * 3;
                    const iy = i * 3 + 1;
                    const iz = i * 3 + 2;

                    // Use frequency data to displace vertices from their original positions
                    // Map vertex index to a frequency bin
                    const freqIndex = i % dataArray.length;
                    const freqValue = dataArray[freqIndex] / 255.0; // 0 to 1
                    
                    const factor = 1 + freqValue * 0.5; // Scale factor

                    positions.array[ix] = initialPositions[ix] * factor;
                    positions.array[iy] = initialPositions[iy] * factor;
                    positions.array[iz] = initialPositions[iz] * factor;
                }
                positions.needsUpdate = true;
                
                // Change color based on bass (first few bins)
                const bassAvg = (dataArray[0] + dataArray[1] + dataArray[2]) / 3 / 255.0;
                material.color.setHSL((Date.now() * 0.0001) % 1, 1, 0.5 + bassAvg * 0.2);
            } else {
                particles.rotation.x += 0.001;
                particles.rotation.y += 0.001;
            }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        let panner = null;
        let aarInterval = null;

        function initAudio(audioElement) {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 128;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                
                // 2026 Trend: Spatial Audio / Audio Augmented Reality (AAR)
                panner = audioContext.createPanner();
                panner.panningModel = 'HRTF'; // High quality 3D spatialization
                panner.distanceModel = 'inverse';
                panner.refDistance = 1;
                panner.maxDistance = 10000;
                panner.rolloffFactor = 1;
                panner.coneInnerAngle = 360;
                panner.coneOuterAngle = 0;
                panner.coneOuterGain = 0;
                
                // Position listener at origin
                const listener = audioContext.listener;
                if(listener.positionX) {
                    listener.positionX.value = 0;
                    listener.positionY.value = 0;
                    listener.positionZ.value = 0;
                    listener.forwardX.value = 0;
                    listener.forwardY.value = 0;
                    listener.forwardZ.value = -1;
                    listener.upX.value = 0;
                    listener.upY.value = 1;
                    listener.upZ.value = 0;
                } else {
                    listener.setPosition(0, 0, 0);
                    listener.setOrientation(0, 0, -1, 0, 1, 0);
                }
            }

            if (!sourceNodes.has(audioElement)) {
                try {
                    const source = audioContext.createMediaElementSource(audioElement);
                    source.connect(analyser);
                    
                    // Route to spatial panner instead of directly to destination
                    analyser.connect(panner);
                    panner.connect(audioContext.destination);
                    
                    sourceNodes.set(audioElement, source);
                } catch(e) {
                    console.error("Audio routing error", e);
                }
            }
            
            // AAR Orbiting effect (Sound slowly orbits around the listener)
            let angle = 0;
            const radius = 2; // meters
            if(aarInterval) clearInterval(aarInterval);
            aarInterval = setInterval(() => {
                angle += 0.01;
                const x = radius * Math.cos(angle);
                const z = radius * Math.sin(angle);
                if(panner.positionX) {
                    panner.positionX.value = x;
                    panner.positionY.value = 0; // eye level
                    panner.positionZ.value = z;
                } else {
                    panner.setPosition(x, 0, z);
                }
            }, 50);
        }

        document.addEventListener('play', function(e){
            if(e.target.tagName === 'AUDIO'){
                initAudio(e.target);
                if(audioContext && audioContext.state === 'suspended') {
                    audioContext.resume();
                }
                document.querySelectorAll('audio').forEach(audio => {
                    if(audio !== e.target) audio.pause();
                });
            }
        }, true);
    </script>
<script src="visualizer.js"></script>
    <script>
        // 2026 UI Trend: "Zero UI" Subtle Audio Feedback
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSubtleClick() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.05);
            
            gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime); // Very subtle
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        document.addEventListener('click', (e) => {
            if(e.target.tagName.toLowerCase() === 'button' || e.target.classList.contains('clickable') || e.target.tagName.toLowerCase() === 'input') {
                playSubtleClick();
            }
        });
    </script>
